<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta
    name="description"
    content="Secure executive committee election portal for members and administrators."
  />
  <meta name="theme-color" content="#2f6fed" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f1729" media="(prefers-color-scheme: dark)" />
  <script>
    (function () {
      var stored = localStorage.getItem('election_theme')
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark')
      }
    })()
  </script>
  <style>
    html,
    body,
    #root {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background-color: hsl(210 40% 98%);
      color: hsl(222 47% 11%);
    }

    html.dark body,
    html.dark #root {
      background-color: hsl(224 44% 6%);
      color: hsl(210 40% 98%);
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="dns-prefetch" href="https://res.cloudinary.com" />
  <title>EC Election System</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
