<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta
    name="description"
    content="Secure executive committee election portal for members and administrators. Cast votes, manage candidates, and view official results."
  />
  <meta
    name="keywords"
    content="executive committee election, member voting, secure ballot, election management, student election portal"
  />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="application-name" content="EC Election System" />
  <meta name="author" content="EC Election System" />
  <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="EC Election System" />
  <meta property="og:title" content="EC Election System" />
  <meta
    property="og:description"
    content="Secure executive committee election portal for members and administrators."
  />
  <meta property="og:locale" content="en_US" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="EC Election System" />
  <meta
    name="twitter:description"
    content="Secure executive committee election portal for members and administrators."
  />
  <script>
    (function () {
      var stored = localStorage.getItem('election_theme')
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark')
      }
    })()
  </script>
  <style>
    html,
    body,
    #root {
      margin: 0;
      min-height: 100%;
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background-color: hsl(220 24% 97%);
      color: hsl(222 47% 11%);
    }

    html.dark body,
    html.dark #root {
      background-color: hsl(224 38% 7%);
      color: hsl(210 40% 98%);
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="dns-prefetch" href="https://res.cloudinary.com" />
  <title>EC Election System</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
